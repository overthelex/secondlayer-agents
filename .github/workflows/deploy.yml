name: Deploy LegalIntern

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-legal-intern
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: Deploy to prod
    runs-on: [self-hosted, local]
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        run: |
          set -euo pipefail
          echo "=== Rebuilding legal-intern container ==="

          ssh prod bash -l <<'REMOTE'
          set -euo pipefail
          cd ~/SecondLayer

          echo "=== Pulling latest deployment config ==="
          git pull origin main

          cd deployment

          docker compose -f docker-compose.prod.yml \
            --env-file .env.prod \
            build --no-cache legal-intern-prod

          echo "=== Restarting container ==="
          docker compose -f docker-compose.prod.yml \
            --env-file .env.prod \
            up -d legal-intern-prod

          echo "=== Waiting for health ==="
          for i in $(seq 1 45); do
            if docker exec legal-intern-prod python -c "import urllib.request; urllib.request.urlopen('http://localhost:7860/')" 2>/dev/null; then
              echo "Container healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done

          echo "=== Health check failed, dumping logs ==="
          docker logs --tail 30 legal-intern-prod
          exit 1
          REMOTE

  sync-hf:
    name: Sync to HuggingFace Space
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://overthelex:${HF_TOKEN}@huggingface.co/spaces/overthelex/legal-intern || true
          git push hf main --force
